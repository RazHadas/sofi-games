<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>פסנתר</title>
  <link rel="manifest" href="manifest.json">
  <style>
    * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; user-select:none; }
    html,body { width:100%; height:100%; overflow:hidden; }

    #bg { position:fixed; inset:0; transition:background 60s linear; z-index:0; }

    #keys {
      position:fixed; inset:0;
      display:flex;
      flex-direction:row;
      z-index:1;
    }

    .key {
      flex:1;
      height:100%;
      display:flex;
      align-items:flex-end;
      justify-content:center;
      padding-bottom:clamp(16px, 4vh, 40px);
      cursor:pointer;
      transition:filter 0.08s ease;
      border-right:3px solid rgba(0,0,0,0.18);
      position:relative;
      overflow:hidden;
    }
    .key:last-child { border-right:none; }

    .key::before {
      content:'';
      position:absolute;
      inset:0;
      background:rgba(255,255,255,0);
      transition:background 0.06s ease;
    }
    .key.pressed::before { background:rgba(255,255,255,0.38); }

    .key-label {
      font-size:clamp(28px, 6vw, 52px);
      font-weight:900;
      color:rgba(255,255,255,0.85);
      text-shadow:0 2px 8px rgba(0,0,0,0.4);
      pointer-events:none;
      z-index:2;
    }

    /* Floating note */
    .note-float {
      position:fixed;
      font-size:clamp(36px, 8vw, 64px);
      pointer-events:none;
      z-index:20;
      animation:noteUp 1.1s ease-out forwards;
    }
    @keyframes noteUp {
      0%   { transform:translateY(0)    scale(0.6); opacity:1; }
      60%  { transform:translateY(-130px) scale(1.1); opacity:1; }
      100% { transform:translateY(-200px) scale(0.9); opacity:0; }
    }

    /* Ripple from tap */
    .tap-ripple {
      position:absolute;
      border-radius:50%;
      background:rgba(255,255,255,0.45);
      pointer-events:none;
      z-index:3;
      animation:rippleOut 0.55s ease-out forwards;
    }
    @keyframes rippleOut {
      0%   { width:20px; height:20px; margin:-10px; opacity:0.9; }
      100% { width:260px; height:260px; margin:-130px; opacity:0; }
    }
  </style>
</head>
<body>
<div id="bg"></div>
<div id="keys"></div>

<script src="theme.js"></script>
<script>
// ─── Time theme ────────────────────────────────────────────────
const bg = document.getElementById('bg');
applyTimeTheme(bg);
setInterval(() => applyTimeTheme(bg), 60000);

// ─── Audio ────────────────────────────────────────────────────
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playNote(freq) {
  const t = audioCtx.currentTime;

  // Fundamental + 2 harmonics for warmth
  [1, 2, 3].forEach((harmonic, i) => {
    const osc  = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);

    osc.type = harmonic === 1 ? 'triangle' : 'sine';
    osc.frequency.value = freq * harmonic;

    const vol = [0.45, 0.15, 0.06][i];
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(vol, t + 0.008);   // fast attack
    gain.gain.exponentialRampToValueAtTime(vol * 0.5, t + 0.15);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 1.6);

    osc.start(t);
    osc.stop(t + 1.7);
  });
}

// ─── Keys config (pentatonic — always sounds nice) ─────────────
const KEYS = [
  { note:'דו',  freq:261.63, color:'#e74c3c', floats:['🎵','❤️'] },
  { note:'רה',  freq:293.66, color:'#e67e22', floats:['🎶','🧡'] },
  { note:'מי',  freq:329.63, color:'#f1c40f', floats:['♪','💛']  },
  { note:'סול', freq:392.00, color:'#2ecc71', floats:['🎵','💚'] },
  { note:'לה',  freq:440.00, color:'#3498db', floats:['🎶','💙'] },
  { note:'דו׳', freq:523.25, color:'#9b59b6', floats:['♪','💜']  },
];

// ─── Build keys ────────────────────────────────────────────────
const keysEl = document.getElementById('keys');

KEYS.forEach((k, idx) => {
  const keyEl = document.createElement('div');
  keyEl.className = 'key';
  keyEl.style.background = k.color;
  keyEl.innerHTML = `<span class="key-label">${k.note}</span>`;

  // Multi-touch support
  keyEl.addEventListener('pointerdown', e => {
    e.preventDefault();
    keyEl.setPointerCapture(e.pointerId);
    trigger(keyEl, k, e.clientX, e.clientY);
  });

  keysEl.appendChild(keyEl);
});

function trigger(keyEl, k, x, y) {
  playNote(k.freq);

  // Press flash
  keyEl.classList.add('pressed');
  setTimeout(() => keyEl.classList.remove('pressed'), 140);

  // Tap ripple
  const ripple = document.createElement('div');
  ripple.className = 'tap-ripple';
  const rect = keyEl.getBoundingClientRect();
  ripple.style.left = (x - rect.left) + 'px';
  ripple.style.top  = (y - rect.top)  + 'px';
  keyEl.appendChild(ripple);
  ripple.addEventListener('animationend', () => ripple.remove());

  // Floating emoji
  const em = k.floats[Math.floor(Math.random() * k.floats.length)];
  const el = document.createElement('div');
  el.className = 'note-float';
  el.textContent = em;
  el.style.left = (x - 24) + 'px';
  el.style.top  = (y - 24) + 'px';
  document.body.appendChild(el);
  el.addEventListener('animationend', () => el.remove());
}
</script>

<!-- Fullscreen button -->
<div id="fsbtn" style="position:fixed;bottom:22px;left:22px;width:64px;height:64px;z-index:999;cursor:pointer;opacity:0.35;transition:opacity 0.15s;touch-action:none;">
  <svg viewBox="0 0 64 64" width="64" height="64">
    <circle cx="32" cy="32" r="28" fill="rgba(0,0,0,0.5)" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
    <g stroke="white" stroke-width="3" stroke-linecap="round" fill="none">
      <path d="M18 26 L18 18 L26 18"/><path d="M38 18 L46 18 L46 26"/>
      <path d="M46 38 L46 46 L38 46"/><path d="M26 46 L18 46 L18 38"/>
    </g>
  </svg>
</div>
<script>
(function(){
  const btn = document.getElementById('fsbtn');
  function isFS() { return !!(document.fullscreenElement || document.webkitFullscreenElement); }
  function enterFS() { const el = document.documentElement; (el.requestFullscreen || el.webkitRequestFullscreen).call(el); }
  function exitFS()  { (document.exitFullscreen || document.webkitExitFullscreen).call(document); }

  if (sessionStorage.getItem('fs') === '1') enterFS();

  btn.addEventListener('pointerdown', function(e) {
    e.stopPropagation(); btn.style.opacity = '1';
    if (!isFS()) { enterFS(); sessionStorage.setItem('fs', '1'); }
    else         { exitFS();  sessionStorage.removeItem('fs'); }
    setTimeout(() => btn.style.opacity = '0.35', 300);
  });
})();
</script>

<!-- Home button & back-lock -->
<div id="hbtn" style="position:fixed;bottom:22px;right:22px;width:64px;height:64px;z-index:999;cursor:pointer;opacity:0.35;transition:opacity 0.15s;touch-action:none;">
  <svg viewBox="0 0 64 64" width="64" height="64">
    <circle cx="32" cy="32" r="28" fill="rgba(0,0,0,0.5)" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
    <circle id="hring" cx="32" cy="32" r="23" fill="none" stroke="white" stroke-width="5"
            stroke-dasharray="144" stroke-dashoffset="144" stroke-linecap="round"
            transform="rotate(-90 32 32)"/>
    <text x="32" y="40" text-anchor="middle" font-size="24" font-family="Arial">🏠</text>
  </svg>
</div>
<script>
(function(){
  const btn  = document.getElementById('hbtn');
  const ring = document.getElementById('hring');
  const HOLD = 700;
  let raf = null, start = null;
  function tick() {
    const p = Math.min((Date.now() - start) / HOLD, 1);
    ring.style.strokeDashoffset = 144 * (1 - p);
    if (p < 1) raf = requestAnimationFrame(tick);
    else window.location.href = 'index.html';
  }
  function cancel() {
    cancelAnimationFrame(raf); raf = null;
    ring.style.strokeDashoffset = 144;
    btn.style.opacity = '0.35';
  }
  btn.addEventListener('pointerdown', e => {
    e.stopPropagation(); btn.setPointerCapture(e.pointerId);
    btn.style.opacity = '1'; start = Date.now(); raf = requestAnimationFrame(tick);
  });
  ['pointerup','pointercancel','pointerleave'].forEach(ev => btn.addEventListener(ev, cancel));

  history.pushState(null, '', location.href);
  window.addEventListener('popstate', () => history.pushState(null, '', location.href));
})();
</script>
</body>
</html>
